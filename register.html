<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - PTIT Online Exam</title>
    <link rel="icon"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_PTIT_University.png/1280px-Logo_PTIT_University.png"
        type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-card {
            max-width: 500px;
            /* Slightly wider for register */
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="auth-logo" style="background: white; padding: 5px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_PTIT_University.png/1280px-Logo_PTIT_University.png"
                        alt="PTIT Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h1 class="auth-title">Tạo Tài Khoản</h1>
                <p class="auth-subtitle">Đăng ký thành viên hệ thống thi trắc nghiệm PTIT</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" class="form-control" placeholder="VD: Nguyễn Văn A" required>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label class="form-label" for="username">Mã SV / Tên đăng nhập</label>
                            <input type="text" id="username" class="form-control" placeholder="VD: N20DCCN001" required>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label class="form-label" for="email">Email PTIT</label>
                            <input type="email" id="email" class="form-control"
                                placeholder="VD: N20DCCN001@student.ptithcm.edu.vn" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="form-group">
                            <label class="form-label" for="password">Mật khẩu</label>
                            <div style="position: relative;">
                                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu"
                                    required minlength="6" style="padding-right: 40px;">
                                <button type="button" id="toggle-password"
                                    style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-light);">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label class="form-label" for="confirm_password">Xác nhận mật khẩu</label>
                            <input type="password" id="confirm_password" class="form-control"
                                placeholder="Nhập lại mật khẩu" required minlength="6">
                        </div>
                    </div>
                </div>

                <div class="error-message" id="register-error" style="margin-bottom: 15px; text-align: center;">Mật khẩu
                    không khớp!</div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Đăng ký tài khoản</button>
            </form>

            <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
                Đã có tài khoản? <a href="login.html" style="font-weight: 600;">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const usernameInput = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const errorEl = document.getElementById('register-error');

            if (password !== confirm_password) {
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';

            if (fullname && email && password && usernameInput) {
                Utils.showToast('Đăng ký phía client đã được gỡ. Vui lòng tích hợp FastAPI backend.', 'info');
            }
        });

        // Toggle Password visibility
        document.getElementById('toggle-password').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
</body>

</html>
