<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài thi - PTIT Online Exam</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_PTIT_University.png/1280px-Logo_PTIT_University.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 20px;
            z-index: 90;
        }

        .exam-info h2 {
            font-size: 1.5rem;
            color: var(--ptit-red);
            margin-bottom: 5px;
        }

        .exam-info p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .timer {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            background: rgba(255, 193, 7, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid var(--ptit-gold);
        }

        .timer.warning {
            color: var(--ptit-red);
            border-color: var(--ptit-red);
            background: rgba(211, 47, 47, 0.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .question-card {
            background: white;
            padding: 30px;
            margin-bottom: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .q-number {
            font-weight: 700;
            color: var(--ptit-red);
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .q-text {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .option-label:hover {
            background: var(--bg-light);
        }

        .option-label.selected {
            border-color: var(--ptit-red);
            background: rgba(211, 47, 47, 0.05);
        }

        .option-input {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            accent-color: var(--ptit-red);
        }

        .submit-area {
            text-align: center;
            margin-top: 40px;
            padding: 30px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .modal h3 {
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .modal p {
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
    </style>
</head>

<body style="background: #Edf2f7;">
    <!-- Minimal Header for Exam Mode -->
    <header class="main-header" style="position: relative; padding: 10px 0;">
        <div class="header-container">
            <div class="header-logo">
                <i class="fas fa-desktop"></i>
                Hệ thống thi PTIT
            </div>
            <div class="user-profile">
                <span id="user-name-display" style="font-weight: 500; color: white;">Sinh viên</span>
            </div>
        </div>
    </header>

    <main class="app-container" style="max-width: 900px; margin-top: 20px;">
        <div class="exam-header glass-panel">
            <div class="exam-info">
                <h2 id="exam-title-display">Đang tải...</h2>
                <p>Sinh viên: <span id="student-name-display" style="font-weight: 600;"></span></p>
                <p>Tổng số câu: <span id="total-q-display"></span> câu</p>
            </div>
            <div class="timer" id="timer-display">
                <i class="far fa-clock"></i> 00:00
            </div>
        </div>

        <form id="exam-form">
            <div id="questions-container">
                <!-- Rendered by JS -->
            </div>

            <div class="submit-area">
                <button type="button" class="btn btn-primary" id="btn-submit-exam"
                    style="padding: 15px 40px; font-size: 1.1rem;">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Nộp bài thi
                </button>
            </div>
        </form>
    </main>

    <!-- Confirm Submit Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <h3>Xác nhận nộp bài</h3>
            <p>Bạn vẫn còn thời gian. Bạn có chắc chắn muốn nộp bài ngay lúc này không?</p>
            <div class="modal-actions">
                <button class="btn btn-outline" id="btn-cancel-submit">Hủy</button>
                <button class="btn btn-primary" id="btn-confirm-submit">Đồng ý Nộp</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Utils.checkAuth();
            document.getElementById('student-name-display').textContent = user.name;

            // Get exam ID from URL or default to 1
            const urlParams = new URLSearchParams(window.location.search);
            const examId = parseInt(urlParams.get('id')) || 1;
            const exam = MockData.exams.find(e => e.id === examId);

            if (!exam) {
                Utils.showToast('Không tìm thấy kỳ thi!', 'error');
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }

            document.getElementById('exam-title-display').textContent = exam.title;

            const questions = MockData.getQuestions(examId);
            document.getElementById('total-q-display').textContent = questions.length;

            // Render Questions
            const qContainer = document.getElementById('questions-container');
            questions.forEach((q, index) => {
                let optionsHtml = '';
                q.options.forEach((opt, oIdx) => {
                    optionsHtml += `
                        <label class="option-label" id="label-q${q.id}-o${oIdx}">
                            <input type="radio" class="option-input" name="q${q.id}" value="${oIdx}">
                            ${String.fromCharCode(65 + oIdx)}. ${opt}
                        </label>
                    `;
                });

                qContainer.innerHTML += `
                    <div class="question-card">
                        <span class="q-number">Câu ${index + 1}</span>
                        <div class="q-text">${q.text}</div>
                        <div class="options">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });

            // Highlight selected options
            qContainer.addEventListener('change', (e) => {
                if (e.target.classList.contains('option-input')) {
                    const name = e.target.name;
                    // Remove selected class from all labels in this group
                    document.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
                        inp.closest('label').classList.remove('selected');
                    });
                    // Add selected class to chosen
                    e.target.closest('label').classList.add('selected');
                }
            });

            // Timer Logic
            let timeRemaining = exam.duration * 60; // Just for demo, normally taken from server
            // Override for quick demo
            timeRemaining = 600; // 10 minutes demo

            const timerDiv = document.getElementById('timer-display');
            const interval = setInterval(() => {
                timeRemaining--;
                timerDiv.innerHTML = `<i class="far fa-clock"></i> ${Utils.formatTime(timeRemaining)}`;

                if (timeRemaining <= 60) {
                    timerDiv.classList.add('warning');
                }

                if (timeRemaining <= 0) {
                    clearInterval(interval);
                    Utils.showToast('Hết thời gian làm bài! Hệ thống tự động nộp bài.', 'error');
                    submitExam();
                }
            }, 1000);

            // Submission Logic
            const modal = document.getElementById('confirm-modal');

            document.getElementById('btn-submit-exam').addEventListener('click', () => {
                modal.style.display = 'flex';
            });

            document.getElementById('btn-cancel-submit').addEventListener('click', () => {
                modal.style.display = 'none';
            });

            document.getElementById('btn-confirm-submit').addEventListener('click', () => {
                modal.style.display = 'none';
                clearInterval(interval);
                submitExam();
            });

            function submitExam() {
                // Collect Answers
                const results = {
                    examId: examId,
                    answers: {}
                };

                questions.forEach(q => {
                    const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                    results.answers[q.id] = selected ? parseInt(selected.value) : null;
                });

                // Tinh toan diem so truoc khi luu vao lich su
                let correctAns = 0;
                const examObj = MockData.exams.find(e => e.id === examId);
                const qList = MockData.getQuestions(examId);

                qList.forEach(q => {
                    if (results.answers[q.id] === q.correct) {
                        correctAns++;
                    }
                });

                const totalQ = qList.length;
                const score10Scale = ((correctAns / totalQ) * examObj.totalScore).toFixed(1);

                // Luu vao lich su (ptit_exam_history)
                results.score = score10Scale;
                results.title = examObj.title;
                results.submittedAt = new Date().toLocaleString('vi-VN');
                results.correctAns = correctAns;
                results.totalQ = totalQ;

                const history = JSON.parse(localStorage.getItem('ptit_exam_history') || '[]');
                history.push(results);
                localStorage.setItem('ptit_exam_history', JSON.stringify(history));

                // Save to localStorage to pass to result page
                localStorage.setItem('temp_exam_result', JSON.stringify(results));

                // Show loading
                document.getElementById('btn-submit-exam').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang nộp bài...';
                document.getElementById('btn-submit-exam').disabled = true;

                setTimeout(() => {
                    window.location.href = `result.html?id=${examId}`;
                }, 1500);
            }
        });
    </script>
</body>

</html>
